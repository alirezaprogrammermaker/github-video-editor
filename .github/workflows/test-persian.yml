name: Test Persian Font

# Isolates WHERE Persian text gets corrupted: input expression → shell → Python.
# Tests multiple transport methods to find a reliable one.

on:
  workflow_dispatch:
    inputs:
      persian_text:
        description: "Persian text to render"
        required: false
        default: "۱۲ فرزند"

env:
  # Apply UTF-8 globally to the whole workflow as a baseline.
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"
  LANG: "C.UTF-8"
  LC_ALL: "C.UTF-8"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install Pillow arabic-reshaper python-bidi

      - name: Inspect raw workflow input (shell level)
        run: |
          echo "=== 1. Raw input via \$GITHUB_EVENT_PATH ==="
          # The workflow_dispatch event JSON contains the TRUE bytes the API received.
          python -c "
          import json
          with open('$GITHUB_EVENT_PATH', encoding='utf-8') as f:
              ev = json.load(f)
              raw = ev.get('inputs', {}).get('persian_text', '')
              print('event input repr:', repr(raw))
              print('event input utf8 hex:', raw.encode('utf-8').hex())
              ok = any('\u0600' <= c <= '\u06FF' for c in raw)
              print('event input has Persian:', ok)
          "

      - name: Test A — inline expression into shell echo
        run: |
          echo "=== 2. Inline expression echo ==="
          T="${{ github.event.inputs.persian_text }}"
          echo "shell var repr (hexdump):"
          printf '%s' "$T" | xxd | head -3

      - name: Test B — pass input as env var to Python
        env:
          PERSIAN_TEXT: ${{ github.event.inputs.persian_text }}
        run: |
          echo "=== 3. Via env var ==="
          python -c "
          import os, sys
          t = os.environ['PERSIAN_TEXT']
          print('env var repr:', repr(t))
          print('env var utf8 hex:', t.encode('utf-8').hex())
          print('has Persian:', any('\u0600' <= c <= '\u06FF' for c in t))
          sys.exit(0 if any('\u0600' <= c <= '\u06FF' for c in t) else 1)
          "

      - name: Test C — pass input as argv to Python
        run: |
          echo "=== 4. Via argv ==="
          python test_persian.py "${{ github.event.inputs.persian_text }}"

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: persian-result
          path: test_persian_output.png
          if-no-files-found: ignore
