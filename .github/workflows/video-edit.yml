name: Video Edit

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "URL of video to edit (leave empty to use bundled video.mp4)"
        required: false
        default: ""
      static_text:
        description: "Static text for first phase (0-2s)"
        required: false
        default: "پدر و دوازده فرزند"
      marquee_text:
        description: "Marquee text (2s-end)"
        required: false
        default: "برای خرید فالوور لایک ویو به @insta_shop پیام بدید"
      watermark_text:
        description: "Watermark text"
        required: false
        default: "@insta_shop"
      output_format:
        description: "Output format: mp4 (direct download) or zip (artifact)"
        required: false
        default: "mp4"
        type: choice
        options:
          - mp4
          - zip

env:
  # Force UTF-8 everywhere. Persian/Arabic text otherwise gets corrupted to
  # "?" by ASCII decoding under a POSIX locale, producing "????" in the video.
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"
  LANG: "C.UTF-8"
  LC_ALL: "C.UTF-8"

jobs:
  edit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Pillow arabic-reshaper python-bidi requests

    - name: Set up fonts
      run: |
        mkdir -p fonts
        if [ -f "fonts/Vazirmatn-Bold.ttf" ]; then
          echo "Using bundled Vazirmatn font"
          ls -la fonts/
        else
          echo "Downloading Vazirmatn font..."
          wget -q -O vazirmatn.zip "https://github.com/rastikerdar/vazirmatn/releases/download/v33.003/vazirmatn-v33.003.zip"
          unzip -jo vazirmatn.zip "fonts/ttf/Vazirmatn-Bold.ttf" -d fonts/
          rm -f vazirmatn.zip
          echo "Downloaded Vazirmatn-Bold.ttf"
        fi
        ls -la fonts/
        file fonts/Vazirmatn-Bold.ttf

    - name: Verify Persian text arrives intact (guard against mojibake)
      run: |
        python - "$GITHUB_EVENT_PATH" <<'PYEOF'
        import json, sys
        event_path = sys.argv[1]
        with open(event_path, encoding="utf-8") as f:
            ev = json.load(f)
        inputs = ev.get("inputs", {})
        for name, val in inputs.items():
            if not val or name == "video_url":
                continue
            has_persian = any("\u0600" <= c <= "\u06FF" or "\u06F0" <= c <= "\u06F9"
                              for c in val)
            print(f"{name}: {val!r}  has_persian={has_persian}")
            if any(c in val for c in ("?", "\ufffd")):
                print(f"ERROR: {name} is corrupted. "
                      "The workflow_dispatch request was not UTF-8 encoded.",
                      file=sys.stderr)
                sys.exit(1)
        PYEOF

    - name: Download video from URL
      if: github.event.inputs.video_url != ''
      env:
        VIDEO_URL: ${{ github.event.inputs.video_url }}
      run: |
        echo "Downloading video from: $VIDEO_URL"
        curl -L -o input_video.mp4 "$VIDEO_URL"
        echo "Downloaded video size: $(du -h input_video.mp4 | cut -f1)"

    - name: Edit video
      env:
        VIDEO_URL: ${{ github.event.inputs.video_url }}
        STATIC_TEXT: ${{ github.event.inputs.static_text }}
        MARQUEE_TEXT: ${{ github.event.inputs.marquee_text }}
        WATERMARK_TEXT: ${{ github.event.inputs.watermark_text }}
      run: |
        INPUT_VIDEO="video.mp4"
        if [ -n "$VIDEO_URL" ]; then
          INPUT_VIDEO="input_video.mp4"
        fi
        python main.py "$INPUT_VIDEO" output.mp4 \
          --template default \
          --static-text "$STATIC_TEXT" \
          --marquee-text "$MARQUEE_TEXT" \
          --watermark-text "$WATERMARK_TEXT"

    - name: Upload as Release (mp4)
      if: github.event.inputs.output_format != 'zip'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: video-${{ github.run_number }}
        name: Video Output #${{ github.run_number }}
        files: outputs/output.mp4
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload as Artifact (zip)
      if: github.event.inputs.output_format == 'zip'
      uses: actions/upload-artifact@v4
      with:
        name: edited-video
        path: outputs/output.mp4
        retention-days: 7
