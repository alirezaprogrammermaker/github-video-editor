name: Video Edit

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "URL of video to edit (leave empty to use bundled video.mp4)"
        required: false
      template:
        description: "Template name to use for editing (e.g. default)"
        required: false
        default: "default"
      static_text:
        description: "Static text for first phase (0-2s)"
        required: false
      marquee_text:
        description: "Marquee text (2s-end)"
        required: false
      watermark_text:
        description: "Watermark text"
        required: false
      webhook_url:
        description: "Webhook URL to notify when build completes (optional)"
        required: false
      shortcode:
        description: "Video shortcode for webhook callback (optional)"
        required: false
      output_format:
        description: "Output format: mp4 (direct download) or zip (artifact)"
        required: false
        default: "mp4"
        type: choice
        options:
          - mp4
          - zip

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  edit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: remotion-video-creator/package-lock.json

    - name: Install Remotion dependencies
      working-directory: remotion-video-creator
      run: npm ci

    - name: Download video from URL
      if: github.event.inputs.video_url != ''
      env:
        VIDEO_URL: ${{ github.event.inputs.video_url }}
      run: |
        echo "Downloading video from: $VIDEO_URL"
        curl -L -o remotion-video-creator/public/input_video.mp4 "$VIDEO_URL"
        echo "Downloaded video size: $(du -h remotion-video-creator/public/input_video.mp4 | cut -f1)"

    - name: Prepare video file
      run: |
        mkdir -p outputs
        cd remotion-video-creator/public
        if [ -f "input_video.mp4" ]; then
          echo "Using downloaded video"
          cp input_video.mp4 video.mp4
        else
          echo "Using bundled video.mp4"
        fi
        ls -la *.mp4

    - name: Render video with Remotion
      env:
        STATIC_TEXT: ${{ github.event.inputs.static_text }}
        MARQUEE_TEXT: ${{ github.event.inputs.marquee_text }}
        WATERMARK_TEXT: ${{ github.event.inputs.watermark_text }}
      working-directory: remotion-video-creator
      run: |
        # Build props JSON for Remotion
        STATIC_TEXT_ESCAPED=$(echo "$STATIC_TEXT" | sed 's/"/\\"/g')
        MARQUEE_TEXT_ESCAPED=$(echo "$MARQUEE_TEXT" | sed 's/"/\\"/g')
        WATERMARK_TEXT_ESCAPED=$(echo "$WATERMARK_TEXT" | sed 's/"/\\"/g')

        npx remotion render \
          --props="{\"watermark\":\"${WATERMARK_TEXT_ESCAPED}\",\"title\":\"${STATIC_TEXT_ESCAPED}\",\"scrollingText\":\"${MARQUEE_TEXT_ESCAPED}\"}" \
          --output="../outputs/output.mp4" \
          --codec="h264" \
          --pixel-format="yuv420p" \
          --crf="18" \
          "InstagramReel"

    - name: Upload as Release (mp4)
      if: github.event.inputs.output_format != 'zip'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: video-${{ github.run_number }}
        name: Video Output #${{ github.run_number }}
        files: outputs/output.mp4
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload as Artifact (zip)
      if: github.event.inputs.output_format == 'zip'
      uses: actions/upload-artifact@v4
      with:
        name: edited-video
        path: outputs/output.mp4
        retention-days: 7

    - name: Notify webhook (success)
      if: success() && github.event.inputs.webhook_url
      env:
        WEBHOOK_URL: ${{ github.event.inputs.webhook_url }}
        SHORTCODE: ${{ github.event.inputs.shortcode }}
        TAG: video-${{ github.run_number }}
        OUTPUT_URL: https://github.com/${{ github.repository }}/releases/download/video-${{ github.run_number }}/output.mp4
      run: |
        echo "Notifying webhook: $WEBHOOK_URL"
        curl -s -X POST "$WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d "{\"shortcode\":\"$SHORTCODE\",\"status\":\"success\",\"tag\":\"$TAG\",\"output_url\":\"$OUTPUT_URL\",\"run_number\":\"${{ github.run_number }}\"}" || true

    - name: Notify webhook (failure)
      if: failure() && github.event.inputs.webhook_url
      env:
        WEBHOOK_URL: ${{ github.event.inputs.webhook_url }}
        SHORTCODE: ${{ github.event.inputs.shortcode }}
        TAG: video-${{ github.run_number }}
      run: |
        echo "Notifying webhook of failure: $WEBHOOK_URL"
        curl -s -X POST "$WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d "{\"shortcode\":\"$SHORTCODE\",\"status\":\"failure\",\"tag\":\"$TAG\",\"error\":\"Workflow failed\"}" || true
