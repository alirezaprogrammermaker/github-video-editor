name: Video Edit

on:
  workflow_dispatch:

jobs:
  edit:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Check FFmpeg
      run: ffmpeg -version

    - name: Edit video
      run: |
        ffmpeg -y \
        -i video.mp4 \
        -vf "drawtext=text='Hello World':fontsize=50:fontcolor=white:x=20:y=20" \
        output.mp4

    - name: Upload output
      uses: actions/upload-artifact@v4
      with:
        name: edited-video
        path: output.mp4
