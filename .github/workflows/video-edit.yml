name: Video Edit

on:
  workflow_dispatch:
    inputs:
      static_text:
        description: "Static text for first phase (0-2s)"
        required: false
        default: "12 فرزند"
      marquee_text:
        description: "Marquee text (2s-end)"
        required: false
        default: "برای خرید فالوور لایک ویدیو اینستاگرام به آیدی @insta_shop پیام بدید"
      watermark_text:
        description: "Watermark text"
        required: false
        default: "@insta_shop"

jobs:
  edit:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Pillow arabic-reshaper python-bidi requests

    - name: Download Vazirmatn font
      run: |
        mkdir -p fonts
        cd fonts
        curl -L -o Vazirmatn.zip "https://github.com/rastikerdar/vazirmatn/releases/download/v33.003/Vazirmatn-fonts-ttf-fonts-ttf-v33.003.zip"
        unzip -j Vazirmatn.zip "fonts/ttf/Vazirmatn/Vazirmatn-Bold.ttf" -d .
        rm Vazirmatn.zip
        ls -la

    - name: Edit video
      run: |
        python main.py video.mp4 output.mp4 \
          --template default \
          --static-text "${{ github.event.inputs.static_text }}" \
          --marquee-text "${{ github.event.inputs.marquee_text }}" \
          --watermark-text "${{ github.event.inputs.watermark_text }}"

    - name: Upload output
      uses: actions/upload-artifact@v4
      with:
        name: edited-video
        path: outputs/output.mp4
        retention-days: 7
