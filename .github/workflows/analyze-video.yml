name: Analyze Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "URL of video to analyze"
        required: true
      webhook_url:
        description: "Webhook URL to send results back"
        required: false
      shortcode:
        description: "Video shortcode identifier"
        required: false

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Download video
      env:
        VIDEO_URL: ${{ github.event.inputs.video_url }}
      run: |
        echo "Downloading video from: $VIDEO_URL"
        curl -L -o video.mp4 "$VIDEO_URL"
        echo "Downloaded video size: $(du -h video.mp4 | cut -f1)"

    - name: Extract key frames
      run: |
        echo "Extracting key frames..."
        DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 video.mp4)
        echo "Video duration: $DURATION seconds"
        INTERVAL=$(echo "$DURATION / 5" | bc -l)
        echo "Frame interval: $INTERVAL seconds"
        ffmpeg -i video.mp4 -vf "fps=1/$INTERVAL" -frames:v 5 frame_%d.jpg -y
        echo "Extracted frames:"
        ls -la frame_*.jpg
        FRAME_COUNT=$(ls frame_*.jpg 2>/dev/null | wc -l)
        echo "Actual frame count: $FRAME_COUNT"

    - name: Extract audio
      run: |
        echo "Extracting audio..."
        ffmpeg -i video.mp4 -vn -acodec pcm_s16le -ar 16000 -ac 1 audio.wav -y
        echo "Audio extracted:"
        ls -la audio.wav

    - name: Get video info
      run: |
        echo "Getting video info..."
        DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 video.mp4)
        echo "Video duration: $DURATION seconds"

    - name: Send results to webhook
      if: github.event.inputs.webhook_url
      env:
        WEBHOOK_URL: ${{ github.event.inputs.webhook_url }}
        SHORTCODE: ${{ github.event.inputs.shortcode }}
      run: |
        echo "Encoding frames and audio to base64..."

        # Dynamically encode all available frames
        FRAMES_JSON="["
        FIRST=true
        for f in frame_*.jpg; do
          if [ -f "$f" ]; then
            B64=$(base64 -w 0 "$f")
            if [ "$FIRST" = true ]; then
              FRAMES_JSON="$FRAMES_JSON\"$B64\""
              FIRST=false
            else
              FRAMES_JSON="$FRAMES_JSON, \"$B64\""
            fi
          fi
        done
        FRAMES_JSON="$FRAMES_JSON]"

        # Encode audio to base64
        AUDIO=$(base64 -w 0 audio.wav)

        # Get audio duration
        AUDIO_DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 audio.wav)

        # Build JSON using Python for proper escaping
        python3 -c "
import json, sys
data = {
    'shortcode': '$SHORTCODE',
    'frames': json.loads('''$FRAMES_JSON'''),
    'audio': '$AUDIO',
    'audio_duration': float('$AUDIO_DURATION')
}
with open('payload.json', 'w') as f:
    json.dump(data, f)
print(f'Payload created with {len(data[\"frames\"])} frames')
"

        echo "Sending to webhook: $WEBHOOK_URL"
        curl -s -X POST "$WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d @payload.json || true
        echo "Webhook sent successfully"
