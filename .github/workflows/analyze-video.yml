name: Analyze Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "URL of video to analyze"
        required: true
      webhook_url:
        description: "Webhook URL to send results back"
        required: false
      shortcode:
        description: "Video shortcode identifier"
        required: false

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Download video
      env:
        VIDEO_URL: ${{ github.event.inputs.video_url }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Downloading video from: $VIDEO_URL"

        # Check if direct download works
        curl -L -o video.mp4 "$VIDEO_URL"
        FILE_SIZE=$(stat -c%s video.mp4 2>/dev/null || echo "0")
        echo "Initial download size: $FILE_SIZE bytes"

        # If file is too small, it's probably an error page - use API instead
        if [ "$FILE_SIZE" -lt 10000 ]; then
          echo "Direct download failed, trying API download..."

          # Extract repo and tag from URL
          # URL format: https://github.com/owner/repo/releases/download/tag/file.mp4
          REPO=$(echo "$VIDEO_URL" | cut -d'/' -f4-5)
          TAG=$(echo "$VIDEO_URL" | sed 's|.*/releases/download/||' | cut -d'/' -f1)

          echo "Repo: $REPO, Tag: $TAG"

          # Get release info via API
          RELEASE_JSON=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG")

          # Extract asset URL
          ASSET_URL=$(echo "$RELEASE_JSON" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['assets'][0]['url'])" 2>/dev/null)

          if [ -n "$ASSET_URL" ]; then
            echo "Asset URL: $ASSET_URL"
            curl -L -H "Accept: application/octet-stream" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -o video.mp4 "$ASSET_URL"
          fi
        fi

        FINAL_SIZE=$(stat -c%s video.mp4 2>/dev/null || echo "0")
        echo "Final video size: $FINAL_SIZE bytes"
        if [ "$FINAL_SIZE" -lt 10000 ]; then
          echo "ERROR: Failed to download video"
          exit 1
        fi
        echo "Downloaded video size: $(du -h video.mp4 | cut -f1)"

    - name: Extract key frames
      run: |
        echo "Extracting key frames..."
        DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 video.mp4)
        echo "Video duration: $DURATION seconds"
        INTERVAL=$(echo "$DURATION / 5" | bc -l)
        echo "Frame interval: $INTERVAL seconds"
        ffmpeg -i video.mp4 -vf "fps=1/$INTERVAL" -frames:v 5 frame_%d.jpg -y
        echo "Extracted frames:"
        ls -la frame_*.jpg

    - name: Extract audio
      run: |
        echo "Extracting audio..."
        ffmpeg -i video.mp4 -vn -acodec pcm_s16le -ar 16000 -ac 1 audio.wav -y
        echo "Audio extracted:"
        ls -la audio.wav

    - name: Get video info
      run: |
        echo "Getting video info..."
        DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 video.mp4)
        echo "Video duration: $DURATION seconds"

    - name: Build and send payload
      if: github.event.inputs.webhook_url
      env:
        WEBHOOK_URL: ${{ github.event.inputs.webhook_url }}
        SHORTCODE: ${{ github.event.inputs.shortcode }}
      run: |
        echo "Building payload..."

        # Build frames JSON array
        FRAMES="[]"
        for f in frame_*.jpg; do
          if [ -f "$f" ]; then
            B64=$(base64 -w 0 "$f")
            FRAMES=$(echo "$FRAMES" | sed "s/]/, \"$B64\"]/")
            FRAMES=$(echo "$FRAMES" | sed "s/\[, /[/")
          fi
        done

        # Get audio as base64
        AUDIO_B64=$(base64 -w 0 audio.wav)

        # Get audio duration
        AUDIO_DUR=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 audio.wav)

        # Write payload file
        echo "{\"shortcode\":\"$SHORTCODE\",\"frames\":$FRAMES,\"audio\":\"$AUDIO_B64\",\"audio_duration\":$AUDIO_DUR}" > payload.json

        echo "Payload size: $(du -h payload.json | cut -f1)"
        echo "Sending to webhook: $WEBHOOK_URL"

        curl -s -X POST "$WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d @payload.json || true

        echo "Webhook sent successfully"
