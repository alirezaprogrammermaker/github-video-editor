name: Release Delete

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name of the release to delete (e.g. video-42)"
        required: true

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Delete release and tag
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ github.event.inputs.tag_name }}
      run: |
        echo "Deleting release with tag: $TAG"
        gh release delete "$TAG" --yes --cleanup-tag
        echo "Release '$TAG' deleted successfully."
