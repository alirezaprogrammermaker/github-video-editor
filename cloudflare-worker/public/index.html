<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Editor - GitHub Actions Trigger</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
    body { font-family: 'Vazirmatn', sans-serif; }
    .spinner { border: 3px solid #e5e7eb; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div class="container mx-auto px-4 py-8 max-w-4xl">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-blue-400 mb-2">Video Editor Trigger</h1>
      <p class="text-gray-400">GitHub Actions Workflow Manager</p>
    </div>

    <!-- Worker URL -->
    <div class="bg-gray-800 rounded-lg p-4 mb-6 border border-gray-700">
      <label class="block text-sm text-gray-400 mb-1">Worker URL</label>
      <div class="flex gap-2">
        <input id="workerUrl" type="text" value="https://github-video-trigger.social-panel.workers.dev"
          class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500" />
      </div>
    </div>

    <!-- Trigger Form -->
    <div class="bg-gray-800 rounded-lg p-6 mb-6 border border-gray-700">
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
        <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        Trigger Workflow
      </h2>

      <div class="space-y-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Video URL (خالی برای ویدیو پیش‌فرض)</label>
          <input id="videoUrl" type="text" placeholder="https://example.com/video.mp4"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500" />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-gray-400 mb-1">Static Text (متن ثابت)</label>
            <input id="staticText" type="text" value="یک پدر و دوازده فرزند"
              class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500" />
          </div>

          <div>
            <label class="block text-sm text-gray-400 mb-1">Watermark Text (واترمارک)</label>
            <input id="watermarkText" type="text" value="@insta_shop"
              class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500" />
          </div>
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1">Marquee Text (متن متحرک)</label>
          <input id="marqueeText" type="text" value="برای خرید فالوور اینستاگرام به آیا ig_shop پیام بدید"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500" />
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1">Output Format</label>
          <select id="outputFormat"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
            <option value="mp4">MP4 (Direct Download)</option>
            <option value="zip">ZIP (Artifact)</option>
          </select>
        </div>

        <button id="triggerBtn" onclick="triggerWorkflow()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
          Trigger Workflow
        </button>
      </div>

      <!-- Trigger Result -->
      <div id="triggerResult" class="hidden mt-4 p-4 rounded-lg"></div>
    </div>

    <!-- Workflow Status -->
    <div class="bg-gray-800 rounded-lg p-6 mb-6 border border-gray-700">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold flex items-center gap-2">
          <svg class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
          </svg>
          Workflow Runs
        </h2>
        <button onclick="refreshStatus()" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
          </svg>
          Refresh
        </button>
      </div>

      <div id="statusLoading" class="text-center py-8 text-gray-400">
        <div class="spinner mx-auto mb-2"></div>
        <p>Loading workflow runs...</p>
      </div>

      <div id="statusError" class="hidden text-center py-8 text-red-400"></div>

      <div id="statusContent" class="hidden space-y-3"></div>
    </div>

    <!-- Latest Release / Video Player -->
    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold flex items-center gap-2">
          <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
          </svg>
          Latest Video
        </h2>
        <button onclick="refreshRelease()" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
          </svg>
          Refresh
        </button>
      </div>

      <div id="releaseLoading" class="text-center py-8 text-gray-400">
        <div class="spinner mx-auto mb-2"></div>
        <p>Loading latest release...</p>
      </div>

      <div id="releaseError" class="hidden text-center py-8 text-gray-500">
        <svg class="w-12 h-12 mx-auto mb-2 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
        </svg>
        <p>No video available yet. Trigger a workflow first.</p>
      </div>

      <div id="releaseContent" class="hidden">
        <div class="mb-4">
          <div class="flex items-center gap-2 text-sm text-gray-400 mb-2">
            <span class="bg-purple-600 text-white px-2 py-0.5 rounded text-xs" id="releaseTag"></span>
            <span id="releaseDate"></span>
          </div>
        </div>

        <div class="rounded-lg overflow-hidden bg-black">
          <video id="videoPlayer" controls class="w-full max-h-96" poster="">
            Your browser does not support the video tag.
          </video>
        </div>

        <div class="mt-4 flex gap-2">
          <a id="downloadBtn" href="#" download
            class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg text-center transition duration-200">
            Download Video
          </a>
          <a id="githubBtn" href="#" target="_blank"
            class="bg-gray-700 hover:bg-gray-600 text-white py-2 px-4 rounded-lg transition duration-200">
            View on GitHub
          </a>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="text-center mt-8 text-gray-500 text-sm">
      <p>GitHub Actions Video Editor | Cloudflare Worker</p>
    </div>
  </div>

  <script>
    const WORKER_URL_INPUT = document.getElementById('workerUrl');
    const TRIGGER_RESULT = document.getElementById('triggerResult');
    const STATUS_LOADING = document.getElementById('statusLoading');
    const STATUS_ERROR = document.getElementById('statusError');
    const STATUS_CONTENT = document.getElementById('statusContent');
    const RELEASE_LOADING = document.getElementById('releaseLoading');
    const RELEASE_ERROR = document.getElementById('releaseError');
    const RELEASE_CONTENT = document.getElementById('releaseContent');

    function getWorkerUrl() {
      return WORKER_URL_INPUT.value.replace(/\/+$/, '');
    }

    async function triggerWorkflow() {
      const btn = document.getElementById('triggerBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Triggering...';

      TRIGGER_RESULT.classList.add('hidden');

      const payload = {
        video_url: document.getElementById('videoUrl').value || undefined,
        static_text: document.getElementById('staticText').value,
        marquee_text: document.getElementById('marqueeText').value,
        watermark_text: document.getElementById('watermarkText').value,
        output_format: document.getElementById('outputFormat').value,
      };

      try {
        const res = await fetch(`${getWorkerUrl()}/api/trigger`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await res.json();

        TRIGGER_RESULT.classList.remove('hidden');

        if (data.success) {
          TRIGGER_RESULT.className = 'mt-4 p-4 rounded-lg bg-green-900/50 border border-green-700 text-green-300';
          TRIGGER_RESULT.innerHTML = `
            <div class="flex items-center gap-2 mb-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
              <strong>Workflow Triggered!</strong>
            </div>
            <p class="text-sm mb-2">${data.message}</p>
            <a href="${data.check_url}" target="_blank" class="text-blue-400 hover:underline text-sm">
              View runs on GitHub &rarr;
            </a>
          `;
          // Auto-refresh status after trigger
          setTimeout(refreshStatus, 2000);
        } else {
          TRIGGER_RESULT.className = 'mt-4 p-4 rounded-lg bg-red-900/50 border border-red-700 text-red-300';
          TRIGGER_RESULT.innerHTML = `
            <div class="flex items-center gap-2 mb-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
              </svg>
              <strong>Error</strong>
            </div>
            <p class="text-sm">${data.error}</p>
          `;
        }
      } catch (err) {
        TRIGGER_RESULT.classList.remove('hidden');
        TRIGGER_RESULT.className = 'mt-4 p-4 rounded-lg bg-red-900/50 border border-red-700 text-red-300';
        TRIGGER_RESULT.innerHTML = `<strong>Network Error:</strong> ${err.message}`;
      }

      btn.disabled = false;
      btn.innerHTML = `
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
        </svg>
        Trigger Workflow
      `;
    }

    async function refreshStatus() {
      STATUS_LOADING.classList.remove('hidden');
      STATUS_ERROR.classList.add('hidden');
      STATUS_CONTENT.classList.add('hidden');

      try {
        const res = await fetch(`${getWorkerUrl()}/api/status`);
        const data = await res.json();

        STATUS_LOADING.classList.add('hidden');

        if (!data.success) {
          STATUS_ERROR.classList.remove('hidden');
          STATUS_ERROR.textContent = data.error || 'Failed to load workflow runs';
          return;
        }

        if (data.runs.length === 0) {
          STATUS_ERROR.classList.remove('hidden');
          STATUS_ERROR.textContent = 'No workflow runs found';
          return;
        }

        STATUS_CONTENT.classList.remove('hidden');
        STATUS_CONTENT.innerHTML = data.runs.map(run => {
          const statusColor = getStatusColor(run.status, run.conclusion);
          const statusIcon = getStatusIcon(run.status, run.conclusion);
          const timeAgo = getTimeAgo(run.created_at);

          return `
            <div class="bg-gray-700/50 rounded-lg p-4 border border-gray-600 hover:border-gray-500 transition">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                  <span class="${statusColor} text-2xl">${statusIcon}</span>
                  <div>
                    <div class="font-medium">Run #${run.run_number}</div>
                    <div class="text-sm text-gray-400">${timeAgo}</div>
                  </div>
                </div>
                <div class="flex items-center gap-3">
                  <span class="${getStatusBadge(run.status, run.conclusion)} px-3 py-1 rounded-full text-sm font-medium">
                    ${getStatusText(run.status, run.conclusion)}
                  </span>
                  <a href="${run.html_url}" target="_blank"
                    class="text-blue-400 hover:text-blue-300 text-sm">
                    View &rarr;
                  </a>
                </div>
              </div>
            </div>
          `;
        }).join('');

      } catch (err) {
        STATUS_LOADING.classList.add('hidden');
        STATUS_ERROR.classList.remove('hidden');
        STATUS_ERROR.textContent = `Error: ${err.message}`;
      }
    }

    async function refreshRelease() {
      RELEASE_LOADING.classList.remove('hidden');
      RELEASE_ERROR.classList.add('hidden');
      RELEASE_CONTENT.classList.add('hidden');

      try {
        const res = await fetch(`${getWorkerUrl()}/api/release`);
        const data = await res.json();

        RELEASE_LOADING.classList.add('hidden');

        if (!data.success || !data.release.video_url) {
          RELEASE_ERROR.classList.remove('hidden');
          return;
        }

        const release = data.release;
        RELEASE_CONTENT.classList.remove('hidden');

        document.getElementById('releaseTag').textContent = release.tag;
        document.getElementById('releaseDate').textContent = new Date(release.created_at).toLocaleString('fa-IR');

        const videoPlayer = document.getElementById('videoPlayer');
        videoPlayer.src = release.video_url;
        videoPlayer.load();

        document.getElementById('downloadBtn').href = release.video_url;
        document.getElementById('downloadBtn').download = release.video_name || 'video.mp4';
        document.getElementById('githubBtn').href = release.html_url;

      } catch (err) {
        RELEASE_LOADING.classList.add('hidden');
        RELEASE_ERROR.classList.remove('hidden');
        RELEASE_ERROR.innerHTML = `<p>Error: ${err.message}</p>`;
      }
    }

    function getStatusColor(status, conclusion) {
      if (status === 'in_progress') return 'text-blue-400 status-pulse';
      if (conclusion === 'success') return 'text-green-400';
      if (conclusion === 'failure') return 'text-red-400';
      if (conclusion === 'cancelled') return 'text-gray-400';
      return 'text-yellow-400';
    }

    function getStatusIcon(status, conclusion) {
      if (status === 'in_progress') return '&#9881;';
      if (conclusion === 'success') return '&#10004;';
      if (conclusion === 'failure') return '&#10008;';
      if (conclusion === 'cancelled') return '&#9679;';
      return '&#8987;';
    }

    function getStatusBadge(status, conclusion) {
      if (status === 'in_progress') return 'bg-blue-900/50 text-blue-300 border border-blue-700';
      if (conclusion === 'success') return 'bg-green-900/50 text-green-300 border border-green-700';
      if (conclusion === 'failure') return 'bg-red-900/50 text-red-300 border border-red-700';
      if (conclusion === 'cancelled') return 'bg-gray-700 text-gray-300 border border-gray-600';
      return 'bg-yellow-900/50 text-yellow-300 border border-yellow-700';
    }

    function getStatusText(status, conclusion) {
      if (status === 'in_progress') return 'In Progress';
      if (status === 'queued') return 'Queued';
      if (conclusion === 'success') return 'Success';
      if (conclusion === 'failure') return 'Failed';
      if (conclusion === 'cancelled') return 'Cancelled';
      return conclusion || status;
    }

    function getTimeAgo(dateStr) {
      const now = new Date();
      const date = new Date(dateStr);
      const diff = Math.floor((now - date) / 1000);

      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    // Initial load
    refreshStatus();
    refreshRelease();
  </script>
</body>
</html>
