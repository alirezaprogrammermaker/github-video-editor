<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Editor - GitHub Actions Trigger</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
    body { font-family: 'Vazirmatn', sans-serif; }
    .spinner { border: 3px solid #e5e7eb; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div class="container mx-auto px-4 py-4 max-w-4xl">
    <!-- Header -->
    <div class="text-center mb-4">
      <h1 class="text-2xl font-bold text-blue-400 mb-1">Video Editor Trigger</h1>
      <p class="text-gray-400 text-sm">GitHub Actions Workflow Manager</p>
    </div>

    <!-- Trigger Form -->
    <div class="bg-gray-800 rounded-lg p-4 mb-4 border border-gray-700">
      <h2 class="text-lg font-bold mb-3 flex items-center gap-2">
        <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        Trigger Workflow
      </h2>

      <div class="space-y-3">
        <div>
          <label class="block text-xs text-gray-400 mb-1">Video URL (خالی برای ویدیو پیش‌فرض)</label>
          <input id="videoUrl" type="text" placeholder="https://example.com/video.mp4"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500" />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-400 mb-1">Static Text (متن ثابت)</label>
            <input id="staticText" type="text" value="پدر و دوازده فرزند"
              class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500" />
          </div>

          <div>
            <label class="block text-xs text-gray-400 mb-1">Watermark Text (واترمارک)</label>
            <input id="watermarkText" type="text" value="@insta_shop"
              class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500" />
          </div>
        </div>

        <div>
          <label class="block text-xs text-gray-400 mb-1">Marquee Text (متن متحرک)</label>
          <input id="marqueeText" type="text" value="برای خرید فالوور لایک ویو به @insta_shop پیام بدید"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500" />
        </div>

        <div>
          <label class="block text-xs text-gray-400 mb-1">Output Format</label>
          <select id="outputFormat"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500">
            <option value="mp4">MP4 (Direct Download)</option>
            <option value="zip">ZIP (Artifact)</option>
          </select>
        </div>

        <button id="triggerBtn" onclick="triggerWorkflow()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
          Trigger Workflow
        </button>
      </div>

      <!-- Trigger Result -->
      <div id="triggerResult" class="hidden mt-3 p-3 rounded-lg"></div>
    </div>

    <!-- All Releases / Video List -->
    <div class="bg-gray-800 rounded-lg p-4 mb-4 border border-gray-700">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-bold flex items-center gap-2">
          <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
          </svg>
          Video Releases
        </h2>
        <button onclick="refreshReleases()" class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1 rounded-lg text-sm flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
          </svg>
          Refresh
        </button>
      </div>

      <div id="releasesLoading" class="text-center py-6 text-gray-400">
        <div class="spinner mx-auto mb-2"></div>
        <p>Loading releases...</p>
      </div>

      <div id="releasesError" class="hidden text-center py-6 text-gray-500">
        <svg class="w-10 h-10 mx-auto mb-2 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
        </svg>
        <p>No releases found. Trigger a workflow first.</p>
      </div>

      <div id="releasesContent" class="hidden space-y-3"></div>
    </div>

    <!-- Worker URL -->
    <div class="bg-gray-800 rounded-lg p-3 mb-4 border border-gray-700">
      <label class="block text-xs text-gray-400 mb-1">Worker URL</label>
      <input id="workerUrl" type="text" value="https://github-video-trigger.social-panel.workers.dev"
        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500" />
    </div>

    <!-- Footer -->
    <div class="text-center mt-4 text-gray-500 text-xs">
      <p>GitHub Actions Video Editor | Cloudflare Worker</p>
    </div>
  </div>

  <script>
    const WORKER_URL_INPUT = document.getElementById('workerUrl');
    const TRIGGER_RESULT = document.getElementById('triggerResult');
    const RELEASES_LOADING = document.getElementById('releasesLoading');
    const RELEASES_ERROR = document.getElementById('releasesError');
    const RELEASES_CONTENT = document.getElementById('releasesContent');

    function getWorkerUrl() {
      return WORKER_URL_INPUT.value.replace(/\/+$/, '');
    }

    async function triggerWorkflow() {
      const btn = document.getElementById('triggerBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Triggering...';

      TRIGGER_RESULT.classList.add('hidden');

      const payload = {
        video_url: document.getElementById('videoUrl').value || undefined,
        static_text: document.getElementById('staticText').value,
        marquee_text: document.getElementById('marqueeText').value,
        watermark_text: document.getElementById('watermarkText').value,
        output_format: document.getElementById('outputFormat').value,
      };

      try {
        const res = await fetch(`${getWorkerUrl()}/api/trigger`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await res.json();

        TRIGGER_RESULT.classList.remove('hidden');

        if (data.success) {
          TRIGGER_RESULT.className = 'mt-3 p-3 rounded-lg bg-green-900/50 border border-green-700 text-green-300';
          TRIGGER_RESULT.innerHTML = `
            <div class="flex items-center gap-2 mb-1">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
              <strong>Workflow Triggered!</strong>
            </div>
            <p class="text-sm mb-1">${data.message}</p>
            <a href="${data.check_url}" target="_blank" class="text-blue-400 hover:underline text-sm">
              View runs on GitHub &rarr;
            </a>
          `;
          setTimeout(() => refreshReleases(), 3000);
        } else {
          TRIGGER_RESULT.className = 'mt-3 p-3 rounded-lg bg-red-900/50 border border-red-700 text-red-300';
          TRIGGER_RESULT.innerHTML = `
            <div class="flex items-center gap-2 mb-1">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
              </svg>
              <strong>Error</strong>
            </div>
            <p class="text-sm">${data.error}</p>
          `;
        }
      } catch (err) {
        TRIGGER_RESULT.classList.remove('hidden');
        TRIGGER_RESULT.className = 'mt-3 p-3 rounded-lg bg-red-900/50 border border-red-700 text-red-300';
        TRIGGER_RESULT.innerHTML = `<strong>Network Error:</strong> ${err.message}`;
      }

      btn.disabled = false;
      btn.innerHTML = `
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
        </svg>
        Trigger Workflow
      `;
    }

    async function refreshReleases() {
      RELEASES_LOADING.classList.remove('hidden');
      RELEASES_ERROR.classList.add('hidden');
      RELEASES_CONTENT.classList.add('hidden');

      try {
        const res = await fetch(`${getWorkerUrl()}/api/releases`);
        const data = await res.json();

        RELEASES_LOADING.classList.add('hidden');

        if (!data.success || !data.releases || data.releases.length === 0) {
          RELEASES_ERROR.classList.remove('hidden');
          return;
        }

        RELEASES_CONTENT.classList.remove('hidden');
        RELEASES_CONTENT.innerHTML = data.releases.map(release => {
          const timeAgo = getTimeAgo(release.created_at);
          const hasVideo = !!release.video_url;

          return `
            <div class="bg-gray-700/50 rounded-lg p-4 border border-gray-600 hover:border-gray-500 transition">
              <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-2">
                  <span class="bg-purple-600 text-white px-2 py-0.5 rounded text-xs">${release.tag}</span>
                  <span class="text-xs text-gray-400">${timeAgo}</span>
                </div>
                <button onclick="deleteRelease('${release.tag}')"
                  class="bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded text-xs flex items-center gap-1 transition">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                  </svg>
                  Delete
                </button>
              </div>

              ${hasVideo ? `
                <div class="rounded-lg overflow-hidden bg-black mb-3">
                  <video controls class="w-full max-h-64" preload="metadata"
                    src="${release.video_url}">
                  </video>
                </div>
                <div class="flex gap-2">
                  <a href="${release.video_url}" download="${release.video_name || 'video.mp4'}"
                    class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg text-center transition duration-200 text-sm">
                    Download
                  </a>
                  <a href="${release.html_url}" target="_blank"
                    class="bg-gray-600 hover:bg-gray-500 text-white py-2 px-4 rounded-lg transition duration-200 text-sm">
                    GitHub
                  </a>
                </div>
              ` : `
                <p class="text-gray-400 text-sm">No video attached</p>
              `}
            </div>
          `;
        }).join('');

      } catch (err) {
        RELEASES_LOADING.classList.add('hidden');
        RELEASES_ERROR.classList.remove('hidden');
        RELEASES_ERROR.innerHTML = `<p>Error: ${err.message}</p>`;
      }
    }

    async function deleteRelease(tag) {
      if (!confirm(`Are you sure you want to delete release '${tag}'?`)) {
        return;
      }

      try {
        const res = await fetch(`${getWorkerUrl()}/api/release/${tag}`, {
          method: 'DELETE',
        });

        const data = await res.json();

        if (data.success) {
          refreshReleases();
        } else {
          alert(`Error: ${data.error}`);
        }
      } catch (err) {
        alert(`Network Error: ${err.message}`);
      }
    }

    function getTimeAgo(dateStr) {
      const now = new Date();
      const date = new Date(dateStr);
      const diff = Math.floor((now - date) / 1000);

      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    // Initial load
    refreshReleases();
  </script>
</body>
</html>
